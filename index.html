<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Corporate Burnout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
    touch-action: none;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: pointer;
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
  #death-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
  }
  #death-screen.visible {
    display: flex;
  }
  #death-inner {
    width: min(100vw, calc(100dvh * 420 / 640));
    background: rgba(10,10,10,0.92);
    border: 3px solid #AA0000;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    color: white;
    text-align: center;
  }
  #death-scroll {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 20px;
    cursor: pointer;
    overflow: hidden;
    touch-action: none;
  }
  .death-divider { color: #AA0000; font-size: 10px; margin: 4px 0; }
  #death-title { color: #FF4444; font-size: 14px; font-weight: bold; margin: 4px 0; }
  #death-body { color: #CCCCCC; font-size: 11px; line-height: 1.7; margin: 10px 0; }
  #death-score-box {
    border: 1px solid #555;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    padding: 8px 40px;
    margin: 10px 0;
    width: 80%;
  }
  #death-score-label { color: #888; font-size: 9px; margin-bottom: 4px; }
  #death-score-value { color: #fff; font-size: 32px; font-weight: bold; }
  #death-ref, #death-case { color: #AAAAAA; font-size: 9px; line-height: 1.8; }
  #death-footer-text { color: #555555; font-size: 8px; line-height: 1.8; margin: 6px 0; }
  #death-reapply {
    color: #FFD700;
    font-size: 13px;
    font-weight: bold;
    margin-top: 8px;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  #death-subscribe {
    flex-shrink: 0;
  }
  #death-subscribe iframe {
    width: 100%;
    height: min(315px, 49dvh);
    border: none;
    display: block;
    background: transparent;
  }
</style>
<script async src="https://subscribe-forms.beehiiv.com/embed.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="death-screen">
  <div id="death-inner">
    <div id="death-scroll">
      <div class="death-divider">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</div>
      <div id="death-title"></div>
      <div class="death-divider">━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━</div>
      <div id="death-body"></div>
      <div id="death-score-box">
        <div id="death-score-label">FINAL PRODUCTIVITY SCORE</div>
        <div id="death-score-value"></div>
      </div>
      <div id="death-ref">REFERENCE: MOD-CORP-7B-BURNOUT-2024</div>
      <div id="death-case"></div>
      <div id="death-footer-text">
        This termination notice was generated automatically.<br>
        No humans were involved in this decision.<br>
        (That's not entirely true.)
      </div>
      <div id="death-reapply">[ TAP TO REAPPLY ]</div>
    </div>
    <div id="death-subscribe">
      <iframe src="https://subscribe-forms.beehiiv.com/8bc9eb67-3d58-4fc9-a1ab-78ace138d7b5"
        data-test-id="beehiiv-embed"
        frameborder="0" scrolling="no"
        style="background-color:transparent;">
      </iframe>
    </div>
  </div>
</div>
<script>
// ─── CANVAS SETUP ───────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const LW = 420, LH = 640; // logical size

function resize() {
  const scale = Math.min(window.innerWidth / LW, window.innerHeight / LH);
  canvas.width = LW;
  canvas.height = LH;
  canvas.style.width = (LW * scale) + 'px';
  canvas.style.height = (LH * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

function showDeathScreen(msg, finalScore) {
  document.getElementById('death-title').textContent = msg.title;
  document.getElementById('death-body').innerHTML = msg.body.split('\n').join('<br>');
  document.getElementById('death-score-value').textContent = Math.floor(finalScore);
  document.getElementById('death-case').textContent = 'HR Case # ' + Math.floor(Math.random() * 90000 + 10000);
  document.getElementById('death-screen').classList.add('visible');
}

function hideDeathScreen() {
  document.getElementById('death-screen').classList.remove('visible');
}

document.getElementById('death-scroll').addEventListener('click', flap);
document.getElementById('death-scroll').addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

    // ignore clicks during countdown
    return;
  }
  if (state === 'playing' && !firstFlap) {
    firstFlap = true;
  }
  birdVel = FLAP;
  flapTimer = 12;
  wingPhase = 1;
}

// ─── OBSTACLE GENERATION ─────────────────────────────────────────────────────
function spawnObstacleWithData(data) {
  _doSpawn(data);
}
function spawnObstacle() {
  const data = OBSTACLES[Math.floor(Math.random() * OBSTACLES.length)];
  _doSpawn(data);
}
function _doSpawn(data) {

  // Jargon clouds float freely — different spawn model
  if (data.type === 'jargon') {
    const CLOUD_H = 169;
    const cloudY = 80 + Math.random() * (LH - 200 - CLOUD_H);
    obstacles.push({
      x: LW + 80,
      gapTop: cloudY,
      gapBottom: cloudY + CLOUD_H,
      hasTop: false,
      hasBottom: false,
      isCloud: true,
      bobOffset: Math.random() * Math.PI * 2,  // random phase so clouds don't sync
      bobSpeed: 0.6 + Math.random() * 0.5,     // slightly different speeds
      data,
      scored: false,
    });
    return;
  }

  const style = Math.random();
  const minGap = 80, maxGap = LH - 80;
  const gapTop = minGap + Math.random() * (maxGap - minGap - gapSize);
  const gapBottom = gapTop + gapSize;

  // style: 0-0.6 = both top+bottom, 0.6-0.8 = top only, 0.8-1.0 = bottom only
  const hasTop = style < 0.8;
  const hasBottom = style < 0.6 || style >= 0.8;

  obstacles.push({
    x: LW + 40,
    gapTop,
    gapBottom,
    hasTop,
    hasBottom,
    isCloud: false,
    data,
    scored: false,
  });
}

// ─── DRAWING HELPERS ─────────────────────────────────────────────────────────
function drawRoundRect(x, y, w, h, r, fill, stroke, strokeW = 2) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeW; ctx.stroke(); }
}

function px(s, bold = false) {
  ctx.font = `${bold ? 'bold ' : ''}${s}px "Courier New", monospace`;
}

const PANELS = [];

function drawBackground() {
  // Base grey
  ctx.fillStyle = C.bgPanel;
  ctx.fillRect(0, 0, LW, LH);

  // Floor line
  ctx.fillStyle = C.bgLine;
  ctx.fillRect(0, LH - 60, LW, 60);
  ctx.fillStyle = C.bgAccent;
  ctx.fillRect(0, LH - 62, LW, 4);

  // Ceiling line
  ctx.fillStyle = C.bgLine;
  ctx.fillRect(0, 0, LW, 30);
  ctx.fillStyle = C.bgAccent;
  ctx.fillRect(0, 28, LW, 4);

  // Cubicle panels
  const panelCount = Math.ceil(LW / PANEL_W) + 2;
  const offset = bgOffset % PANEL_W;

  for (let i = 0; i < panelCount; i++) {
    const px2 = i * PANEL_W - offset;
    const panelIdx = (Math.floor(bgOffset / PANEL_W) + i) % PANELS.length;
    const panel = PANELS[Math.max(0, panelIdx)];

    // Panel divider
    ctx.fillStyle = C.bgLine;
    ctx.fillRect(px2, 30, 4, LH - 60);

    // Panel face
    ctx.fillStyle = i % 2 === 0 ? '#C2C2C2' : '#CACACA';
    ctx.fillRect(px2 + 4, 30, PANEL_W - 4, LH - 90);

    // Horizontal rail on panel
    ctx.fillStyle = C.bgLine;
    ctx.fillRect(px2 + 4, LH - 180, PANEL_W - 4, 6);

    if (panel && panel.hasPoster) {
      // Motivational poster
      const pw = 80, ph = 60;
      const px3 = px2 + 20, py3 = panel.posterY;
      ctx.fillStyle = C.bgPoster;
      ctx.fillRect(px3, py3, pw, ph);
      ctx.strokeStyle = C.bgPosterLine;
      ctx.lineWidth = 2;
      ctx.strokeRect(px3, py3, pw, ph);
      ctx.fillStyle = '#888878';
      ctx.font = '7px "Courier New"';
      ctx.textAlign = 'center';
      const lines = panel.posterText.split('\n');
      lines.forEach((line, li) => {
        ctx.fillText(line, px3 + pw / 2, py3 + 14 + li * 10);
      });
      // Poster border decoration
      ctx.strokeStyle = '#A0A090';
      ctx.lineWidth = 1;
      ctx.strokeRect(px3 + 3, py3 + 3, pw - 6, ph - 6);
    }

    if (panel && panel.hasPlant) {
      // Sad desk plant (stick figure cactus basically)
      const bx = px2 + 60, by = LH - 130;
      ctx.fillStyle = '#8B7355'; ctx.fillRect(bx, by + 18, 14, 10); // pot
      ctx.fillStyle = '#5A7A3A'; ctx.fillRect(bx + 4, by, 6, 22); // stem
      ctx.fillRect(bx, by + 8, 6, 4); // branch L
      ctx.fillRect(bx + 8, by + 5, 6, 4); // branch R
    }
  }

  // Fluorescent light strips on ceiling
  for (let lx = 40; lx < LW; lx += 120) {
    const bx2 = lx - bgOffset % 120;
    ctx.fillStyle = 'rgba(255,255,200,0.25)';
    ctx.fillRect(bx2, 4, 80, 20);
    ctx.fillStyle = 'rgba(255,255,220,0.8)';
    ctx.fillRect(bx2 + 4, 6, 72, 14);
  }
}

// Draw a floating jargon cloud (standalone obstacle, not a stack)
function drawCloudObstacle(obs) {
  const { x, data } = obs;
  const CLOUD_W = 300;
  const CLOUD_H = 169;

  // Real-time vertical bob — uses elapsed time so it moves even while scrolling
  const bob = Math.sin(Date.now() * 0.001 * obs.bobSpeed + obs.bobOffset) * 17;
  const baseY = obs.gapTop + CLOUD_H / 2;
  const cy = baseY + bob;
  const cx = x + CLOUD_W / 2;

  ctx.save();

  // Drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(cx + 5, cy + CLOUD_H/2, CLOUD_W/2 - 12, 14, 0, 0, Math.PI*2);
  ctx.fill();

  // Cloud puffs — scaled 3x from original
  const puffs = [
    [0,      15,    98, 60],   // main body
    [-79,    26,    56, 45],   // left lobe
    [79,     26,    56, 45],   // right lobe
    [-41,   -19,    60, 49],   // top-left puff
    [41,    -23,    56, 45],   // top-right puff
    [0,     -34,    49, 38],   // top-center puff
    [-98,   11,     34, 30],   // far left
    [98,    11,     34, 30],   // far right
  ];

  // Dark underside
  puffs.forEach(([rx2, ry2, rx, ry]) => {
    ctx.beginPath();
    ctx.ellipse(cx + rx2, cy + ry2 + 6, rx, ry, 0, 0, Math.PI*2);
    ctx.fillStyle = '#C0C0B8';
    ctx.fill();
  });

  // Main body
  puffs.forEach(([rx2, ry2, rx, ry]) => {
    ctx.beginPath();
    ctx.ellipse(cx + rx2, cy + ry2, rx, ry, 0, 0, Math.PI*2);
    ctx.fillStyle = '#ECECEA';
    ctx.fill();
  });

  // Bright highlights on upper puffs
  puffs.slice(3).forEach(([rx2, ry2, rx, ry]) => {
    ctx.beginPath();
    ctx.ellipse(cx + rx2, cy + ry2 - 6, rx * 0.65, ry * 0.5, 0, 0, Math.PI*2);
    ctx.fillStyle = '#F8F8F6';
    ctx.fill();
  });

  // Outlines
  puffs.forEach(([rx2, ry2, rx, ry]) => {
    ctx.beginPath();
    ctx.ellipse(cx + rx2, cy + ry2, rx, ry, 0, 0, Math.PI*2);
    ctx.strokeStyle = '#BBBBAA';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Jargon text — large, stamped look
  const label = data.label;
  const fontSize = label.length > 14 ? 13 : label.length > 9 ? 16 : 19;
  ctx.fillStyle = '#3A3A38';
  ctx.font = `bold ${fontSize}px "Courier New"`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, cx, cy + 8);

  // ™ superscript
  ctx.fillStyle = '#888880';
  ctx.font = '8px "Courier New"';
  ctx.textBaseline = 'alphabetic';
  const tw = ctx.measureText(label).width;
  ctx.fillText('™', cx + tw/2 + 4, cy + 2);

  ctx.restore();
}


// Draw a single jargon bubble (unused stacked version, kept for CARD_DRAWERS map)
function drawJargonCard(x, y, data, idx) {
  const w = OBS_W, h = CARD_H;

  ctx.fillStyle = '#E8E8E0';
  ctx.strokeStyle = '#AAAAAA';

  ctx.beginPath();

  ctx.fillStyle = '#EBEBDF';

    [x+14, y+10, 12, 9], [x+w/2, y+5, 14, 10], [x+w-14, y+10, 11, 9]
  ];

const CARD_DRAWERS = {
  email: drawEmailCard,
  slack: drawSlackCard,
  calendar: drawCalendarCard,
  jargon: drawJargonCard,
};

function drawObstacle(obs) {
  if (obs.isCloud) { drawCloudObstacle(obs); return; }
  const { x, gapTop, gapBottom, hasTop, hasBottom, data } = obs;
  const drawer = CARD_DRAWERS[data.type] || drawEmailCard;
  const cardStep = CARD_H - CARD_GAP;

  // TOP stack: cards hang down from ceiling, last card closest to gap
  if (hasTop && gapTop > 30) {
    const count = Math.max(1, Math.ceil(gapTop / cardStep));
    for (let i = 0; i < count; i++) {
      const cardY = i * cardStep - (count * cardStep - gapTop) - 2;
      if (cardY + CARD_H < 0) continue;
      drawer(x, cardY, data, i);
    }
    // Small "pinned" indicator at ceiling edge
    ctx.fillStyle = '#666';
    ctx.fillRect(x + OBS_W/2 - 12, 0, 24, 5);
    ctx.fillStyle = '#999';
    ctx.fillRect(x + OBS_W/2 - 1, 0, 2, Math.min(12, gapTop));
  }

  // BOTTOM stack: cards stack up from floor, first card closest to gap
  if (hasBottom && gapBottom < LH - 30) {
    const availH = LH - gapBottom;
    const count = Math.max(1, Math.ceil(availH / cardStep));
    for (let i = 0; i < count; i++) {
      const cardY = gapBottom + i * cardStep;
      if (cardY > LH) break;
      drawer(x, cardY, data, i + 10);
    }
    // Pin at floor
    ctx.fillStyle = '#666';
    ctx.fillRect(x + OBS_W/2 - 12, LH - 5, 24, 5);
    ctx.fillStyle = '#999';
    ctx.fillRect(x + OBS_W/2 - 1, LH - Math.min(12, availH), 2, Math.min(12, availH));
  }
}

// ─── BRAIN DRAWING ────────────────────────────────────────────────────────────
function drawBrain(bx, by, vel, flapT, sweat) {
  if (!BRAIN_IMG.complete) return;

  // flapT counts down from 12 on click — use it for wing animation
  // wingLift: how far (in px) to shift the wing portion upward  
  const wingLift = flapT > 0 ? Math.round((flapT / 12) * 10) : 0;

  // Tie sway: swings opposite velocity direction — clamped so it doesn't go insane
  const tieSwayX = Math.max(-4, Math.min(4, vel * 1.2));
  const tieSwayY = Math.min(6, Math.abs(vel) * 0.6);

  // Overall tilt
  const angle = Math.max(-0.3, Math.min(0.4, vel * 0.035));

  // The sprite is 320x145 natural, we draw at SPRITE_W x SPRITE_H
  // Brain collision box is BIRD_W x BIRD_H centered approx at right 65% of sprite
  const sx = bx - BRAIN_OFFSET_X; // draw sprite starting x (wings extend left)
  const sy = by - 4;

  ctx.save();
  // Rotate around brain center
  const brainCX = bx + BIRD_W / 2;
  const brainCY = by + BIRD_H / 2;
  ctx.translate(brainCX, brainCY);
  ctx.rotate(angle);
  ctx.translate(-brainCX, -brainCY);

  // Draw the wing portion lifted (top-left ~45% of sprite width, full height)
  // Wing region in sprite: src x 0..144, src y 0..145 (natural px)
  const wingDrawW = Math.round(SPRITE_W * 0.47);
  const wingDrawH = SPRITE_H;
  const wingSrcW = Math.round(320 * 0.47);
  ctx.drawImage(
    BRAIN_IMG,
    0, 0, wingSrcW, 145,          // source rect (natural px)
    sx, sy - wingLift,             // dest: lifted on flap
    wingDrawW, wingDrawH
  );

  // Draw the brain body + right wing (right 65% of sprite) — never lifted
  const bodyDrawX = sx + wingDrawW;
  const bodySrcX = wingSrcW;
  ctx.drawImage(
    BRAIN_IMG,
    bodySrcX, 0, 320 - bodySrcX, 145,
    bodyDrawX, sy,
    SPRITE_W - wingDrawW, wingDrawH
  );

    // Tie — anchored to the lower-front of the brain body, not below it
  // Brain body center is roughly right 65% of sprite; tie sits at the "chin"
  const tieX = brainCX + 14;           // forward toward the face
  const tieBaseY = by + BIRD_H * 0.82; // just below the brain body
  ctx.save();
  ctx.translate(tieX, tieBaseY);
  ctx.rotate(tieSwayX * 0.025);       // subtle sway, not wild

  // Collar points — small white triangles on each side of knot
  ctx.fillStyle = '#F0EEE8';
  ctx.beginPath();
  ctx.moveTo(-7, 0); ctx.lineTo(0, 5); ctx.lineTo(-7, 8); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(7, 0); ctx.lineTo(0, 5); ctx.lineTo(7, 8); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#CCCCCC'; ctx.lineWidth = 0.5; ctx.stroke();

  // Knot
  ctx.fillStyle = '#1E2E7A';
  ctx.beginPath();
  ctx.moveTo(-4, 3); ctx.lineTo(4, 3); ctx.lineTo(3, 9); ctx.lineTo(-3, 9);
  ctx.closePath(); ctx.fill();

  // Short blade — just pokes out below the knot, doesn't dangle far
  const swayX = tieSwayX * 0.2;
  ctx.beginPath();
  ctx.moveTo(-4, 9);
  ctx.lineTo(4, 9);
  ctx.lineTo(4 + swayX, 17);
  ctx.lineTo(0, 21 + tieSwayY * 0.3);
  ctx.lineTo(-4 + swayX, 17);
  ctx.closePath();
  ctx.fillStyle = '#1E2E7A'; ctx.fill();
  ctx.strokeStyle = '#0D1850'; ctx.lineWidth = 0.8; ctx.stroke();

  // Stripe
  ctx.strokeStyle = '#4A5AB0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(-2, 12); ctx.lineTo(2, 12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-3, 16); ctx.lineTo(3, 16); ctx.stroke();

  ctx.restore(); // tie


  // Sweat drops when falling fast
  if (sweat > 0 && vel > 2) {
    ctx.globalAlpha = Math.min(0.9, sweat / 8);
    ctx.fillStyle = '#88CCFF';
    const sw = bx + BIRD_W + 2;
    ctx.beginPath(); ctx.ellipse(sw, by + 8, 3, 5, 0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sw + 6, by + 18, 2, 3.5, 0.1, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ─── PARTICLES ────────────────────────────────────────────────────────────────
function spawnParticles(x, y) {
  const texts = ['!', '!!', '😵', '📧', '📅', '💀', 'OOF'];
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: x + Math.random() * BIRD_W,
      y: y + Math.random() * BIRD_H,
      vx: (Math.random() - 0.5) * 6,
      vy: -Math.random() * 5 - 2,
      life: 1,
      size: 4 + Math.random() * 6,
      color: Math.random() < 0.5 ? C.particleRed : C.particleYellow,
      text: Math.random() < 0.3 ? texts[Math.floor(Math.random() * texts.length)] : null,
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2;
    p.life -= 0.03;
    ctx.globalAlpha = p.life;
    if (p.text) {
      ctx.font = `${Math.round(p.size * 2)}px "Courier New"`;
      ctx.textAlign = 'center';
      ctx.fillStyle = p.color;
      ctx.fillText(p.text, p.x, p.y);
    } else {
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  });
}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function checkCollision(obs) {
  const bx1 = BIRD_X + COLL_PAD;
  const bx2 = BIRD_X + BIRD_W - COLL_PAD;
  const by1 = birdY + COLL_PAD;
  const by2 = birdY + BIRD_H - COLL_PAD;

  if (obs.isCloud) {
    const CLOUD_W = 300;
    const CLOUD_H = 169;
    const bob = Math.sin(Date.now() * 0.001 * obs.bobSpeed + obs.bobOffset) * 17;
    const cx = obs.x + CLOUD_W / 2;
    const cy = obs.gapTop + CLOUD_H / 2 + bob;
    const rx = CLOUD_W / 2 - 25;
    const ry = CLOUD_H / 2 - 28;
    const dx = (bx1 + bx2) / 2 - cx;
    const dy = (by1 + by2) / 2 - cy;
    return (dx * dx) / (rx * rx) + (dy * dy) / (ry * ry) <= 1;
  }

  if (bx2 < obs.x || bx1 > obs.x + OBS_W) return false;
  if (obs.hasTop && by1 < obs.gapTop) return true;
  if (obs.hasBottom && by2 > obs.gapBottom) return true;
  return false;
}

// ─── HUD & UI ─────────────────────────────────────────────────────────────────
function drawScore() {
  const scoreStr = Math.floor(score).toString();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  drawRoundRect(LW / 2 - 60, 40, 120, 38, 6, 'rgba(0,0,0,0.45)', null);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 28px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(scoreStr, LW / 2, 68);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '10px "Courier New"';
  ctx.fillText('PRODUCTIVITY SCORE', LW / 2, 86);
}

function drawStartScreen() {
  // Title card
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  drawRoundRect(30, LH / 2 - 180, LW - 60, 360, 8, 'rgba(20,20,20,0.85)', '#555', 2);

  ctx.fillStyle = '#FF4444';
  ctx.font = 'bold 13px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('MEGACORP INTERNAL TRAINING MODULE 7B', LW / 2, LH / 2 - 148);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 32px "Courier New"';
  ctx.fillText('CORPORATE', LW / 2, LH / 2 - 110);
  ctx.fillStyle = '#FF9944';
  ctx.fillText('BURNOUT', LW / 2, LH / 2 - 72);

  ctx.fillStyle = '#AAAAAA';
  ctx.font = '9px "Courier New"';
  ctx.fillText('A Workplace Wellness Experience™', LW / 2, LH / 2 - 52);

  // Draw little brain preview
  ctx.save();
  ctx.translate(LW / 2 - 27, LH / 2 - 42);
  ctx.scale(0.85, 0.85);
  drawBrain(0, 0, -2, 12, 0);
  ctx.restore();

  ctx.fillStyle = '#CCCCCC';
  ctx.font = '11px "Courier New"';
  ctx.fillText('You are an exhausted brain.', LW / 2, LH / 2 + 26);
  ctx.fillText('Your only job is to survive', LW / 2, LH / 2 + 42);
  ctx.fillText('the corporate gauntlet.', LW / 2, LH / 2 + 58);
  ctx.fillText('(This is not a metaphor.)', LW / 2, LH / 2 + 74);

  // Blink tap to start
  if (Math.floor(Date.now() / 600) % 2 === 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 14px "Courier New"';
    ctx.fillText('[ TAP / CLICK / SPACE ]', LW / 2, LH / 2 + 112);
    ctx.fillStyle = '#AAAAAA';
    ctx.font = '10px "Courier New"';
    ctx.fillText('to begin your performance review', LW / 2, LH / 2 + 130);
  }

  if (hiScore > 0) {
    ctx.fillStyle = 'rgba(255,200,0,0.8)';
    ctx.font = '10px "Courier New"';
    ctx.fillText(`PERSONAL BEST: ${Math.floor(hiScore)} pts`, LW / 2, LH / 2 + 158);
  }
}

function drawCountdown(secondsLeft) {
  const label = secondsLeft > 0 ? Math.ceil(secondsLeft).toString() : 'GO!';
  const pulse = 1 + Math.sin(Date.now() / 120) * 0.06;

  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  drawRoundRect(LW / 2 - 54, LH / 2 - 70, 108, 108, 12, 'rgba(0,0,0,0.45)', '#555', 2);

  ctx.save();
  ctx.translate(LW / 2, LH / 2 - 16);
  ctx.scale(pulse, pulse);
  ctx.fillStyle = secondsLeft > 0 ? '#FFD700' : '#44FF88';
  ctx.font = `bold 64px "Courier New"`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, 0, 0);
  ctx.restore();
  ctx.textBaseline = 'alphabetic';

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '11px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText(secondsLeft > 0 ? 'GET READY...' : 'CLICK / TAP TO FLY!', LW / 2, LH / 2 + 56);
}

function drawWaitingForFlap() {
  if (Math.floor(Date.now() / 600) % 2 === 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    drawRoundRect(LW / 2 - 90, LH / 2 + 60, 180, 36, 6, 'rgba(0,0,0,0.5)', '#FFD700', 2);
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 13px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('[ CLICK TO START ]', LW / 2, LH / 2 + 84);
  }
}

// ─── MAIN GAME LOOP ────────────────────────────────────────────────────────────
let lastTime = 0;
let deathParticlesSpawned = false;

function loop(ts) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;

  ctx.clearRect(0, 0, LW, LH);
  drawBackground();

  if (state === 'start') {
    // Gentle float animation on start screen
    const floatY = LH / 2 - 120 + Math.sin(ts / 800) * 8;
    drawBrain(BIRD_X, floatY, Math.sin(ts / 800) * 2, Math.sin(ts / 300) > 0 ? 12 : 0, 0);
    drawStartScreen();
    requestAnimationFrame(loop);
    return;
  }

  if (state === 'countdown') {
    countdownTimer -= dt / 1000;
    // Scroll background to feel alive
    bgOffset += speed * (dt / 16.67);
    // Brain hovers in place
    birdY = LH / 2 - 20;
    birdVel = 0;
    flapTimer = Math.sin(Date.now() / 300) > 0 ? 12 : 0; // wing flap animation
    drawBrain(BIRD_X, birdY, 0, flapTimer, 0);
    if (countdownTimer <= 0) {
      state = 'playing';
      drawCountdown(0); // show GO!
    } else {
      drawCountdown(countdownTimer);
    }
    requestAnimationFrame(loop);
    return;
  }

  if (state === 'playing') {
    if (!firstFlap) {
      // Waiting for first click — brain hovers, background scrolls, no gravity yet
      bgOffset += speed * (dt / 16.67);
      birdY = LH / 2 - 20 + Math.sin(Date.now() / 700) * 6;
      birdVel = 0;
      flapTimer = Math.sin(Date.now() / 300) > 0 ? 12 : 0;
      drawBrain(BIRD_X, birdY, 0, flapTimer, 0);
      drawWaitingForFlap();
      requestAnimationFrame(loop);
      return;
    }

    // Physics
    const dtFactor = dt / 16.67;
    birdVel += GRAVITY * dtFactor;
    birdY += birdVel * dtFactor;
    if (flapTimer > 0) flapTimer -= dtFactor;
    if (flapTimer <= 0 && wingPhase === 1) wingPhase = 0;
    sweatAnim = Math.max(0, sweatAnim + (birdVel > 2 ? 0.5 : -0.5) * dtFactor);

    // Scroll
    bgOffset += speed * (dt / 16.67);

    // Score & difficulty — noticeable step-ups at score ~400 and ~1000
    gameTime += dt / 1000;
    score = gameTime * 8;

    if (score < 400) {
      speed = 2.8 + (score / 400) * 0.4;          // 2.8 → 3.2 gradually
      gapSize = 210;
    } else if (score < 1000) {
      const t = (score - 400) / 600;
      speed = 3.4 + t * 0.7;                      // 3.4 → 4.1
      gapSize = 190 - t * 35;                      // 190 → 155
    } else {
      const t = Math.min(1, (score - 1000) / 1000);
      speed = 4.3 + t * 1.2;                      // 4.3 → 5.5
      gapSize = Math.max(130, 155 - t * 25);       // 155 → 130
    }

    // Obstacle logic
    obstacles.forEach(o => { o.x -= speed * (dt / 16.67); });
    obstacles = obstacles.filter(o => o.x > -(o.isCloud ? 320 : OBS_W) - 20);

    if (obstacles.length === 0 || (() => {
      const last = obstacles[obstacles.length - 1];
      const minGap = last && last.isCloud ? 340 : last && !last.isCloud ? 340 : 220;
      return last.x < LW - minGap;
    })()) {
      // Never spawn a cloud immediately after a stack (or vice versa) — enforce a clear gap
      const last = obstacles[obstacles.length - 1];
      const lastIsCloud = last && last.isCloud;
      const nextData = OBSTACLES[Math.floor(Math.random() * OBSTACLES.length)];
      const nextIsCloud = nextData.type === 'jargon';
      // If last was a cloud, force a non-cloud next; if last was a stack, clouds are fine
      // but add extra spacing for clouds following stacks
      if (lastIsCloud && nextIsCloud) {
        // re-roll until we get a non-cloud
        let safeData;
        let attempts = 0;
        do { safeData = OBSTACLES[Math.floor(Math.random() * OBSTACLES.length)]; attempts++; }
        while (safeData.type === 'jargon' && attempts < 20);
        spawnObstacleWithData(safeData);
      } else {
        spawnObstacle();
      }
    }

    // Score obstacles
    obstacles.forEach(o => {
      const passX = o.isCloud ? o.x + 150 : o.x + OBS_W;
      if (!o.scored && passX < BIRD_X) {
        o.scored = true;
      }
    });

    // Collision
    const hit = birdY > LH - BIRD_H - 30 || birdY < 0 || obstacles.some(checkCollision);
    if (hit) {
      state = 'dead';
      deathParticlesSpawned = false;
      if (score > hiScore) hiScore = score;
      deathMsg = GAME_OVER_MSGS[Math.floor(Math.random() * GAME_OVER_MSGS.length)];
      showDeathScreen(deathMsg, score);
    }
  }

  // Draw obstacles
  ctx.textAlign = 'center';
  obstacles.forEach(drawObstacle);

  // Draw brain
  if (state === 'playing') {
    drawBrain(BIRD_X, birdY, birdVel, flapTimer, sweatAnim);
    drawScore();
  } else if (state === 'dead') {
    if (!deathParticlesSpawned) {
      spawnParticles(BIRD_X, birdY);
      deathParticlesSpawned = true;
    }
    drawBrain(BIRD_X, Math.min(birdY + (birdVel += GRAVITY * dtFactor) * dtFactor, LH - BIRD_H - 32), birdVel, 0, 10);
    updateParticles();
  }

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
